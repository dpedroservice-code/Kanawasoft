<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kanawa Soft - Sistema de Gestão</title>
    <link rel="shortcut icon" href="https://i.ibb.co/rf1prbJ0/KANAWASOFT.jpg" type="image/x-icon">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/rf1prbJ0/KANAWASOFT.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/rf1prbJ0/KANAWASOFT.jpg">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
        }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        @media (max-width: 480px) { .auth-card { border-radius: 1rem; margin: 0.5rem; } }
        .input-group { position: relative; margin-bottom: 1rem; }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 1rem; pointer-events: none; }
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: white;
        }
        .input-field:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .input-field.error { border-color: #ef4444; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.875rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .social-btn {
            width: 100%;
            padding: 0.75rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.75rem;
            background: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .social-btn:hover { background: #f9fafb; border-color: #d1d5db; }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.875rem 1.5rem;
            border-radius: 9999px;
            color: white;
            z-index: 10000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-size: 0.875rem;
            white-space: nowrap;
        }
        @media (max-width: 480px) { .toast { white-space: normal; text-align: center; max-width: 90%; font-size: 0.75rem; } }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-spinner {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-overlay.active { display: flex; }
        .loading-content { background: white; padding: 2rem; border-radius: 1rem; text-align: center; min-width: 200px; }
        .loading-spinner-large { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        .bg-shape { position: fixed; background: rgba(255, 255, 255, 0.05); border-radius: 50%; pointer-events: none; z-index: 0; }
        .password-toggle {
            position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #9ca3af; background: transparent; border: none; font-size: 1rem;
        }
        .auth-link { color: #667eea; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .auth-link:hover { color: #764ba2; text-decoration: underline; }
        .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e5e7eb; }
        .divider span { padding: 0 1rem; color: #9ca3af; font-size: 0.875rem; }
        @media (max-width: 480px) { .input-field { padding: 0.75rem 1rem 0.75rem 2.5rem; font-size: 16px; } .text-3xl { font-size: 1.5rem; } }

        .role-badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .role-badge.admin { background: #dbeafe; color: #1e40af; }
        .role-badge.seller { background: #d1fae5; color: #065f46; }
        .role-badge.user { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner-large"></div>
            <p id="loadingMessage" class="text-gray-700">Processando...</p>
        </div>
    </div>

    <!-- Floating Background Shapes -->
    <div class="bg-shape" style="width: 300px; height: 300px; top: -100px; right: -100px;"></div>
    <div class="bg-shape" style="width: 200px; height: 200px; bottom: -50px; left: -50px;"></div>
    <div class="bg-shape" style="width: 150px; height: 150px; top: 50%; right: 20%;"></div>

    <div class="auth-container">
        <!-- Login Card -->
        <div id="loginCard" class="auth-card" style="display: block;">
            <div class="p-6 md:p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-chart-line text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Kanawa Soft</h2>
                    <p class="text-gray-500 text-sm mt-1">Sistema de Gestão Empresarial</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" class="input-field" placeholder="Email" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="input-field" placeholder="Senha" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    
                    <div class="flex justify-between items-center mb-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 text-indigo-600 rounded">
                            <span class="ml-2 text-sm text-gray-600">Lembrar-me</span>
                        </label>
                        <button type="button" onclick="showRecoveryCard()" class="text-sm text-indigo-600 hover:text-indigo-700">
                            Esqueceu a senha?
                        </button>
                    </div>

                    <button type="submit" id="loginSubmitBtn" class="btn-primary">
                        <span>Entrar</span>
                    </button>
                </form>

                <div class="divider"><span>ou</span></div>

                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="loginWithGoogle()" class="social-btn">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-sm hidden sm:inline">Google</span>
                    </button>
                    <button onclick="loginWithGithub()" class="social-btn">
                        <i class="fab fa-github text-gray-800"></i>
                        <span class="text-sm hidden sm:inline">GitHub</span>
                    </button>
                </div>

                <div class="text-center">
                    <p class="text-gray-600 text-sm">
                        Não tem uma conta?
                        <button type="button" onclick="showRegisterCard()" class="auth-link">Criar conta gratuita</button>
                    </p>
                </div>

                <div class="mt-6 pt-4 border-t text-center text-xs text-gray-400">
                    <p>© 2026 Kanawa Soft - Todos os direitos reservados</p>
                </div>
            </div>
        </div>

        <!-- Register Card -->
        <div id="registerCard" class="auth-card" style="display: none;">
            <div class="p-6 md:p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-green-500 to-teal-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-user-plus text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Criar Conta</h2>
                    <p class="text-gray-500 text-sm mt-1">Preencha os dados para se cadastrar</p>
                </div>

                <form id="registerForm">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="registerName" class="input-field" placeholder="Nome completo" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="registerEmail" class="input-field" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="registerPhone" class="input-field" placeholder="Telefone (opcional)">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="registerPassword" class="input-field" placeholder="Senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" id="registerConfirmPassword" class="input-field" placeholder="Confirmar senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword')">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>

                    <div class="mb-4">
                        <label class="flex items-start cursor-pointer">
                            <input type="checkbox" id="acceptTerms" class="w-4 h-4 text-indigo-600 rounded mt-0.5">
                            <span class="ml-2 text-xs text-gray-600">
                                Li e aceito os <a href="#" class="text-indigo-600">Termos de Serviço</a> e 
                                <a href="#" class="text-indigo-600">Política de Privacidade</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" id="registerSubmitBtn" class="btn-primary">
                        <span>Criar Conta</span>
                    </button>
                </form>

                <div class="divider"><span>ou</span></div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button onclick="loginWithGoogle()" class="social-btn">
                        <i class="fab fa-google text-red-500"></i>
                        <span class="text-sm hidden sm:inline">Google</span>
                    </button>
                    <button onclick="loginWithGithub()" class="social-btn">
                        <i class="fab fa-github text-gray-800"></i>
                        <span class="text-sm hidden sm:inline">GitHub</span>
                    </button>
                </div>

                <div class="text-center">
                    <button type="button" onclick="showLoginCard()" class="auth-link text-sm">
                        ← Voltar para o login
                    </button>
                </div>
            </div>
        </div>

        <!-- Password Recovery Card -->
        <div id="recoveryCard" class="auth-card" style="display: none;">
            <div class="p-6 md:p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-yellow-500 to-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-key text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Recuperar Senha</h2>
                    <p class="text-gray-500 text-sm mt-1">Digite seu email para receber as instruções</p>
                </div>

                <form id="recoveryForm">
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="recoveryEmail" class="input-field" placeholder="Seu email cadastrado" required>
                    </div>

                    <button type="submit" id="recoverySubmitBtn" class="btn-primary mt-4">
                        <span>Enviar Instruções</span>
                    </button>
                </form>

                <div class="text-center mt-6">
                    <button type="button" onclick="showLoginCard()" class="auth-link text-sm">
                        ← Voltar para o login
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== SUPABASE SDK ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js">
    </script>

    <script>
        (function() {
            'use strict';

            // ==================== SUPABASE CONFIG ====================
            const SUPABASE_CONFIG = {
                url: 'https://khuqlsjohhhokttrkluo.supabase.co',
                key: 'sb_secret_nuTkOXL3yQLkhFYJSxGYbw_UBdTknBq'
            };

            // ==================== INICIALIZAR SUPABASE ====================
            let supabase = null;
            let supabaseReady = false;

            try {
                supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
                supabaseReady = true;
                console.log('✅ Supabase inicializado com sucesso!');
            } catch (error) {
                console.error('❌ Erro ao inicializar Supabase:', error);
            }

            // ==================== ESTADO ====================
            const state = {
                isLoading: false,
                isAuthenticated: false,
                supabase: supabase,
                session: null,
                user: null,
                userRole: null
            };

            // ==================== DOM REFS ====================
            const DOM = {
                loadingOverlay: document.getElementById('loadingOverlay'),
                loadingMessage: document.getElementById('loadingMessage'),
                loginCard: document.getElementById('loginCard'),
                registerCard: document.getElementById('registerCard'),
                recoveryCard: document.getElementById('recoveryCard'),
                loginForm: document.getElementById('loginForm'),
                registerForm: document.getElementById('registerForm'),
                recoveryForm: document.getElementById('recoveryForm'),
                loginEmail: document.getElementById('loginEmail'),
                loginPassword: document.getElementById('loginPassword'),
                loginSubmitBtn: document.getElementById('loginSubmitBtn'),
                registerSubmitBtn: document.getElementById('registerSubmitBtn'),
                recoverySubmitBtn: document.getElementById('recoverySubmitBtn'),
                rememberMe: document.getElementById('rememberMe')
            };

            // ==================== ROLES E PERMISSÕES ====================
            const ROLES = {
                ADMIN: 'admin',
                SELLER: 'vendedor',
                USER: 'user'
            };

            const ROLE_PERMISSIONS = {
                [ROLES.ADMIN]: {
                    pages: ['dashboard.html', 'pdv.html', 'produtos.html', 'clientes.html', 'vendas.html', 'relatorios.html', 'usuarios.html', 'configuracoes.html'],
                    canManageUsers: true,
                    canManageProducts: true,
                    canManageSales: true,
                    canViewReports: true,
                    canAccessPDV: true
                },
                [ROLES.SELLER]: {
                    pages: ['dashboard.html', 'pdv.html'],
                    canManageUsers: false,
                    canManageProducts: false,
                    canManageSales: true,
                    canViewReports: false,
                    canAccessPDV: true
                },
                [ROLES.USER]: {
                    pages: ['dashboard.html'],
                    canManageUsers: false,
                    canManageProducts: false,
                    canManageSales: false,
                    canViewReports: false,
                    canAccessPDV: false
                }
            };

            // ==================== TOAST ====================
            function showToast(message, type = 'info') {
                const existingToasts = document.querySelectorAll('.toast');
                existingToasts.forEach(toast => toast.remove());

                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `<span>${message}</span>`;
                document.body.appendChild(toast);
                
                setTimeout(() => toast.remove(), 4000);
            }
            window.showToast = showToast;

            // ==================== LOADING ====================
            function showLoading(message = 'Processando...') {
                state.isLoading = true;
                if (DOM.loadingMessage) DOM.loadingMessage.textContent = message;
                if (DOM.loadingOverlay) DOM.loadingOverlay.classList.add('active');
            }

            function hideLoading() {
                state.isLoading = false;
                if (DOM.loadingOverlay) DOM.loadingOverlay.classList.remove('active');
            }

            // ==================== NAVEGAÇÃO ENTRE CARDS ====================
            window.showLoginCard = function() {
                DOM.loginCard.style.display = 'block';
                DOM.registerCard.style.display = 'none';
                DOM.recoveryCard.style.display = 'none';
            };

            window.showRegisterCard = function() {
                DOM.loginCard.style.display = 'none';
                DOM.registerCard.style.display = 'block';
                DOM.recoveryCard.style.display = 'none';
            };

            window.showRecoveryCard = function() {
                DOM.loginCard.style.display = 'none';
                DOM.registerCard.style.display = 'none';
                DOM.recoveryCard.style.display = 'block';
            };

            // ==================== TOGGLE PASSWORD ====================
            window.togglePassword = function(fieldId) {
                const field = document.getElementById(fieldId);
                if (!field) return;
                const icon = field.parentElement.querySelector('.password-toggle i');
                if (!icon) return;
                
                if (field.type === 'password') {
                    field.type = 'text';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                } else {
                    field.type = 'password';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                }
            };

            // ==================== SALVAR USUÁRIO ====================
            async function saveUserToLocal(user) {
                const userData = {
                    id: user.id,
                    name: user.nome || user.email.split('@')[0],
                    email: user.email,
                    phone: user.telefone || '',
                    photoURL: `https://ui-avatars.com/api/?name=${encodeURIComponent(user.nome || user.email)}&background=667eea&color=fff`,
                    role: user.role || ROLES.USER,
                    lastLogin: new Date().toISOString()
                };
                
                localStorage.setItem('user', JSON.stringify(userData));
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginTime', new Date().toISOString());
                localStorage.setItem('userRole', userData.role);
                state.userRole = userData.role;
                return userData;
            }

            async function createUserInSupabase(userData) {
                if (!supabase) return null;
                try {
                    const { data: existing } = await supabase
                        .from('usuarios')
                        .select('*')
                        .eq('email', userData.email)
                        .maybeSingle();

                    if (existing) {
                        return existing;
                    }

                    const { data, error } = await supabase
                        .from('usuarios')
                        .insert([{
                            nome: userData.name,
                            email: userData.email,
                            telefone: userData.phone || '',
                            role: ROLES.USER,
                            created_at: new Date().toISOString()
                        }])
                        .select();

                    if (error) throw error;
                    return data?.[0] || null;
                } catch (error) {
                    console.warn('Erro ao salvar no Supabase:', error);
                    return null;
                }
            }

            // ==================== REDIRECIONAR POR ROLE ====================
            function redirectByRole(role) {
                const rolePerm = ROLE_PERMISSIONS[role] || ROLE_PERMISSIONS[ROLES.USER];
                
                // Se for admin, vai para dashboard completo
                if (role === ROLES.ADMIN) {
                    return 'dashboard.html';
                }
                
                // Se for vendedor, vai para PDV
                if (role === ROLES.SELLER) {
                    return 'pdv.html';
                }
                
                // Usuário comum vai para dashboard limitado
                return 'dashboard.html';
            }

            // ==================== VERIFICAR SESSÃO ====================
            async function checkExistingSession() {
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                if (isLoggedIn === 'true') {
                    const loginTime = localStorage.getItem('loginTime');
                    const hoursSinceLogin = (new Date() - new Date(loginTime)) / (1000 * 60 * 60);
                    if (hoursSinceLogin < 24) {
                        const userData = JSON.parse(localStorage.getItem('user') || '{}');
                        const role = localStorage.getItem('userRole') || ROLES.USER;
                        
                        if (userData.email && supabase) {
                            try {
                                const { data } = await supabase
                                    .from('usuarios')
                                    .select('*')
                                    .eq('email', userData.email)
                                    .maybeSingle();
                                if (data) {
                                    state.userRole = data.role || ROLES.USER;
                                    localStorage.setItem('userRole', state.userRole);
                                    window.location.href = redirectByRole(state.userRole);
                                    return;
                                }
                            } catch (e) {
                                // Fallback - permitir acesso com base no papel salvo
                                window.location.href = redirectByRole(role);
                                return;
                            }
                        }
                    }
                }
                loadSavedEmail();
            }

            function loadSavedEmail() {
                const savedEmail = localStorage.getItem('savedEmail');
                if (savedEmail && DOM.loginEmail) {
                    DOM.loginEmail.value = savedEmail;
                    if (DOM.rememberMe) DOM.rememberMe.checked = true;
                }
            }

            // ==================== LOGIN COM EMAIL/SENHA ====================
            async function loginWithEmail(email, password) {
                if (!supabase) throw new Error('Supabase não inicializado');
                
                const { data: user, error: findError } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();

                if (findError) throw new Error('Erro ao buscar usuário');
                if (!user) throw new Error('Usuário não encontrado');

                if (user.senha && user.senha !== password) {
                    throw new Error('Senha incorreta');
                }

                if (!user.senha) {
                    const { error: updateError } = await supabase
                        .from('usuarios')
                        .update({ senha: password })
                        .eq('email', email);

                    if (updateError) {
                        console.warn('Erro ao atualizar senha:', updateError);
                    }
                }

                return user;
            }

            // ==================== REGISTRO ====================
            async function registerUser(name, email, phone, password) {
                if (!supabase) throw new Error('Supabase não inicializado');

                const { data: existing } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();

                if (existing) throw new Error('Email já cadastrado');

                const { data, error } = await supabase
                    .from('usuarios')
                    .insert([{
                        nome: name,
                        email: email,
                        telefone: phone || '',
                        senha: password,
                        role: ROLES.USER,
                        created_at: new Date().toISOString()
                    }])
                    .select();

                if (error) throw error;
                return data?.[0] || null;
            }

            // ==================== RECUPERAR SENHA ====================
            async function resetPassword(email) {
                if (!supabase) throw new Error('Supabase não inicializado');

                const { data: user } = await supabase
                    .from('usuarios')
                    .select('*')
                    .eq('email', email)
                    .maybeSingle();

                if (!user) throw new Error('Usuário não encontrado');

                console.log(`📧 Email de recuperação enviado para ${email}`);
                return true;
            }

            // ==================== HANDLE SUCCESSFUL LOGIN ====================
            async function handleSuccessfulLogin(user) {
                showLoading('Entrando no sistema...');
                try {
                    const userRole = user.role || ROLES.USER;
                    state.userRole = userRole;
                    await saveUserToLocal({ ...user, role: userRole });
                    
                    const redirectPage = redirectByRole(userRole);
                    const roleNames = {
                        [ROLES.ADMIN]: 'Administrador',
                        [ROLES.SELLER]: 'Vendedor',
                        [ROLES.USER]: 'Usuário'
                    };
                    
                    showToast(`Bem-vindo, ${user.nome || user.email}! (${roleNames[userRole] || 'Usuário'})`, 'success');
                    setTimeout(() => { window.location.href = redirectPage; }, 1500);
                } catch (error) {
                    console.error('Erro:', error);
                    showToast('Erro ao carregar dados do usuário', 'error');
                    hideLoading();
                }
            }

            // ==================== LOGIN FORM ====================
            if (DOM.loginForm) {
                DOM.loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    if (state.isLoading) return;

                    const email = DOM.loginEmail.value.trim();
                    const password = DOM.loginPassword.value;
                    const remember = DOM.rememberMe ? DOM.rememberMe.checked : false;

                    if (!email || !password) {
                        showToast('Preencha todos os campos', 'warning');
                        return;
                    }

                    showLoading('Verificando credenciais...');
                    
                    try {
                        if (supabase) {
                            const user = await loginWithEmail(email, password);
                            
                            if (remember) {
                                localStorage.setItem('savedEmail', email);
                            } else {
                                localStorage.removeItem('savedEmail');
                            }
                            
                            await handleSuccessfulLogin(user);
                        } else {
                            // Modo offline - usuários de demonstração com roles
                            const demoUsers = {
                                'admin@kanawasoft.com': { password: 'admin123', nome: 'Administrador', role: ROLES.ADMIN },
                                'vendedor@kanawasoft.com': { password: 'vender123', nome: 'Vendedor', role: ROLES.SELLER },
                                'user@kanawasoft.com': { password: 'user123', nome: 'Usuário', role: ROLES.USER }
                            };
                            
                            if (demoUsers[email] && demoUsers[email].password === password) {
                                const userData = {
                                    id: Date.now(),
                                    nome: demoUsers[email].nome,
                                    email: email,
                                    role: demoUsers[email].role
                                };
                                await handleSuccessfulLogin(userData);
                            } else {
                                throw new Error('Email ou senha incorretos');
                            }
                        }
                    } catch (error) {
                        console.error('Erro:', error);
                        let errorMessage = error.message || 'Erro ao fazer login';
                        showToast(errorMessage, 'error');
                        hideLoading();
                    }
                });
            }

            // ==================== REGISTER FORM ====================
            if (DOM.registerForm) {
                DOM.registerForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    if (state.isLoading) return;

                    const name = document.getElementById('registerName').value.trim();
                    const email = document.getElementById('registerEmail').value.trim();
                    const phone = document.getElementById('registerPhone').value.trim();
                    const password = document.getElementById('registerPassword').value;
                    const confirmPassword = document.getElementById('registerConfirmPassword').value;
                    const acceptTerms = document.getElementById('acceptTerms').checked;

                    if (!name || !email || !password) {
                        showToast('Preencha todos os campos obrigatórios', 'warning');
                        return;
                    }

                    if (password !== confirmPassword) {
                        showToast('As senhas não coincidem', 'error');
                        return;
                    }

                    if (password.length < 6) {
                        showToast('A senha deve ter pelo menos 6 caracteres', 'warning');
                        return;
                    }

                    if (!acceptTerms) {
                        showToast('Aceite os termos de serviço', 'warning');
                        return;
                    }

                    showLoading('Criando sua conta...');

                    try {
                        if (supabase) {
                            const user = await registerUser(name, email, phone, password);
                            if (user) {
                                showToast('Conta criada com sucesso!', 'success');
                                DOM.loginEmail.value = email;
                                DOM.loginPassword.value = password;
                                showLoginCard();
                                showToast('Faça login com sua nova conta', 'info');
                            }
                        } else {
                            // Modo offline
                            const userData = {
                                id: Date.now(),
                                nome: name,
                                email: email,
                                telefone: phone,
                                role: ROLES.USER
                            };
                            localStorage.setItem('user', JSON.stringify(userData));
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('loginTime', new Date().toISOString());
                            localStorage.setItem('userRole', ROLES.USER);
                            showToast('Conta criada com sucesso! (Modo offline)', 'success');
                            setTimeout(() => window.location.href = 'dashboard.html', 1500);
                        }
                    } catch (error) {
                        console.error('Erro:', error);
                        let errorMessage = error.message || 'Erro ao criar conta';
                        showToast(errorMessage, 'error');
                    } finally {
                        hideLoading();
                    }
                });
            }

            // ==================== RECOVERY FORM ====================
            if (DOM.recoveryForm) {
                DOM.recoveryForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    if (state.isLoading) return;

                    const email = document.getElementById('recoveryEmail').value.trim();

                    if (!email) {
                        showToast('Digite seu email', 'warning');
                        return;
                    }

                    showLoading('Enviando email de recuperação...');

                    try {
                        if (supabase) {
                            await resetPassword(email);
                            showToast('Email de recuperação enviado! Verifique sua caixa de entrada.', 'success');
                        } else {
                            showToast('Modo offline - Entre em contato com o administrador', 'warning');
                        }
                        setTimeout(() => window.showLoginCard(), 3000);
                    } catch (error) {
                        console.error('Erro:', error);
                        showToast(error.message || 'Erro ao enviar email', 'error');
                    } finally {
                        hideLoading();
                    }
                });
            }

            // ==================== SOCIAL LOGIN ====================
            window.loginWithGoogle = async () => {
                if (state.isLoading) return;
                if (!navigator.onLine) {
                    showToast('Você está offline. Conecte-se à internet.', 'warning');
                    return;
                }
                
                if (!supabase) {
                    showToast('Autenticação social disponível apenas online', 'warning');
                    return;
                }

                showLoading('Conectando com Google...');
                try {
                    const { data, error } = await supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: {
                            redirectTo: window.location.origin + '/dashboard.html'
                        }
                    });
                    
                    if (error) throw error;
                    showToast('Redirecionando para autenticação...', 'info');
                } catch (error) {
                    console.error('Erro Google:', error);
                    showToast('Erro ao autenticar com Google', 'error');
                    hideLoading();
                }
            };

            window.loginWithGithub = async () => {
                if (state.isLoading) return;
                if (!navigator.onLine) {
                    showToast('Você está offline. Conecte-se à internet.', 'warning');
                    return;
                }
                
                if (!supabase) {
                    showToast('Autenticação social disponível apenas online', 'warning');
                    return;
                }

                showLoading('Conectando com GitHub...');
                try {
                    const { data, error } = await supabase.auth.signInWithOAuth({
                        provider: 'github',
                        options: {
                            redirectTo: window.location.origin + '/dashboard.html'
                        }
                    });
                    
                    if (error) throw error;
                    showToast('Redirecionando para autenticação...', 'info');
                } catch (error) {
                    console.error('Erro GitHub:', error);
                    showToast('Erro ao autenticar com GitHub', 'error');
                    hideLoading();
                }
            };

            // ==================== VERIFICAR SESSÃO DO SUPABASE ====================
            async function checkSupabaseSession() {
                if (!supabase) return;
                try {
                    const { data: { session }, error } = await supabase.auth.getSession();
                    if (error) throw error;
                    
                    if (session) {
                        const { data: user } = await supabase
                            .from('usuarios')
                            .select('*')
                            .eq('email', session.user.email)
                            .maybeSingle();
                        
                        if (user) {
                            await handleSuccessfulLogin(user);
                        } else if (session.user) {
                            const { data: newUser, error: createError } = await supabase
                                .from('usuarios')
                                .insert([{
                                    nome: session.user.user_metadata?.full_name || session.user.email.split('@')[0],
                                    email: session.user.email,
                                    role: ROLES.USER,
                                    created_at: new Date().toISOString()
                                }])
                                .select();
                            
                            if (!createError && newUser) {
                                await handleSuccessfulLogin(newUser[0]);
                            }
                        }
                    }
                } catch (error) {
                    console.warn('Erro ao verificar sessão:', error);
                }
            }

            // ==================== INICIAR ====================
            async function init() {
                await checkSupabaseSession();
                await checkExistingSession();
                
                if (supabase) {
                    supabase.auth.onAuthStateChange((event, session) => {
                        if (event === 'SIGNED_IN' && session) {
                            checkSupabaseSession();
                        }
                    });
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>
</body>
</html>
