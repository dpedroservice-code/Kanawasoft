<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Kanawa Soft - Sistema de Gestão</title>
    <link rel="shortcut icon" href="https://i.ibb.co/rf1prbJ0/KANAWASOFT.jpg" type="image/x-icon">
    <link rel="icon" type="image/jpg" href="https://i.ibb.co/rf1prbJ0/KANAWASOFT.jpg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/rf1prbJ0/KANAWASOFT.jpg">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
        }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card {
            background: rgba(255,255,255,0.98);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 450px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        @media (max-width: 480px) { .auth-card { border-radius: 1rem; margin: 0.5rem; } }
        .input-group { position: relative; margin-bottom: 1rem; }
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 1rem; pointer-events: none; }
        .input-field {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: white;
        }
        .input-field:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .input-field.error { border-color: #ef4444; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.875rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(102,126,234,0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.875rem 1.5rem;
            border-radius: 9999px;
            color: white;
            z-index: 10000;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            font-size: 0.875rem;
            white-space: nowrap;
        }
        @media (max-width: 480px) { .toast { white-space: normal; text-align: center; max-width: 90%; font-size: 0.75rem; } }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .toast-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .toast-info { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        .loading-spinner {
            display: inline-block;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .loading-overlay.active { display: flex; }
        .loading-content { background: white; padding: 2rem; border-radius: 1rem; text-align: center; min-width: 200px; }
        .loading-spinner-large { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        .bg-shape { position: fixed; background: rgba(255,255,255,0.05); border-radius: 50%; pointer-events: none; z-index: 0; }
        .password-toggle {
            position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #9ca3af; background: transparent; border: none; font-size: 1rem;
        }
        .auth-link { color: #667eea; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .auth-link:hover { color: #764ba2; text-decoration: underline; }
        .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid #e5e7eb; }
        .divider span { padding: 0 1rem; color: #9ca3af; font-size: 0.875rem; }
        @media (max-width: 480px) { .input-field { padding: 0.75rem 1rem 0.75rem 2.5rem; font-size: 16px; } .text-3xl { font-size: 1.5rem; } }
        
        .role-btn {
            padding: 0.5rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.5rem;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }
        .role-btn:hover { border-color: #667eea; background: #f0f4ff; }
        .role-btn.selected { border-color: #667eea; background: #667eea; color: white; }
        .role-btn i { font-size: 1rem; }
        .role-btn.selected i { color: white; }
        
        .company-fields { display: none; border-top: 1px solid #e5e7eb; padding-top: 1rem; margin-top: 1rem; }
        .company-fields.show { display: block; }

        .shake {
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner-large"></div>
            <p id="loadingMessage" class="text-gray-700 font-medium">Processando...</p>
            <p id="loadingSubMessage" class="text-gray-400 text-sm mt-1">Aguarde um momento</p>
        </div>
    </div>

    <!-- Floating Background Shapes -->
    <div class="bg-shape" style="width: 300px; height: 300px; top: -100px; right: -100px;"></div>
    <div class="bg-shape" style="width: 200px; height: 200px; bottom: -50px; left: -50px;"></div>
    <div class="bg-shape" style="width: 150px; height: 150px; top: 50%; right: 20%;"></div>

    <div class="auth-container">
        <!-- Login Card -->
        <div id="loginCard" class="auth-card" style="display: block;">
            <div class="p-6 md:p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-chart-line text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Kanawa Soft</h2>
                    <p class="text-gray-500 text-sm mt-1">Sistema de Gestão Empresarial</p>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="loginEmail" class="input-field" placeholder="Email" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" class="input-field" placeholder="Senha" required autocomplete="current-password">
                        <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    
                    <div class="flex justify-between items-center mb-6">
                        <label class="flex items-center cursor-pointer">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 text-indigo-600 rounded">
                            <span class="ml-2 text-sm text-gray-600">Lembrar-me</span>
                        </label>
                        <button type="button" onclick="showRecoveryCard()" class="text-sm text-indigo-600 hover:text-indigo-700">
                            Esqueceu a senha?
                        </button>
                    </div>

                    <button type="submit" id="loginSubmitBtn" class="btn-primary">
                        <span>Entrar</span>
                    </button>
                </form>

                <div class="text-center mt-6">
                    <p class="text-gray-600 text-sm">
                        Não tem uma conta?
                        <button type="button" onclick="showRegisterCard()" class="auth-link">Criar conta gratuita</button>
                    </p>
                </div>

                <div class="mt-6 pt-4 border-t text-center text-xs text-gray-400">
                    <p>© 2026 Kanawa Soft - Todos os direitos reservados</p>
                </div>
            </div>
        </div>

        <!-- Register Card -->
        <div id="registerCard" class="auth-card" style="display: none;">
            <div class="p-6 md:p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-green-500 to-teal-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-user-plus text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Criar Conta</h2>
                    <p class="text-gray-500 text-sm mt-1">Preencha os dados para se cadastrar</p>
                </div>

                <form id="registerForm">
                    <div class="input-group">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="registerName" class="input-field" placeholder="Nome completo" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="registerEmail" class="input-field" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="registerPhone" class="input-field" placeholder="Telefone (opcional)">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="registerPassword" class="input-field" placeholder="Senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('registerPassword')">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-check-circle input-icon"></i>
                        <input type="password" id="registerConfirmPassword" class="input-field" placeholder="Confirmar senha" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('registerConfirmPassword')">
                            <i class="fas fa-eye-slash"></i>
                        </button>
                    </div>

                    <!-- Role Selection -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tipo de Conta</label>
                        <div class="grid grid-cols-2 gap-2">
                            <button type="button" class="role-btn selected" data-role="user" onclick="selectRole(this)">
                                <i class="fas fa-user"></i> Usuário
                            </button>
                            <button type="button" class="role-btn" data-role="vendedor" onclick="selectRole(this)">
                                <i class="fas fa-store"></i> Vendedor
                            </button>
                            <button type="button" class="role-btn" data-role="admin" onclick="selectRole(this)">
                                <i class="fas fa-user-cog"></i> Admin
                            </button>
                            <button type="button" class="role-btn" data-role="administrador" onclick="selectRole(this)">
                                <i class="fas fa-crown"></i> Administrador
                            </button>
                        </div>
                        <input type="hidden" id="registerRole" value="user">
                    </div>

                    <!-- Company Fields (apenas para Admin/Administrador) -->
                    <div id="companyFields" class="company-fields">
                        <p class="text-sm font-semibold text-gray-700 mb-3">Dados da Empresa</p>
                        <div class="input-group">
                            <i class="fas fa-building input-icon"></i>
                            <input type="text" id="companyName" class="input-field" placeholder="Nome da Empresa *">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-id-card input-icon"></i>
                            <input type="text" id="companyCnpj" class="input-field" placeholder="NIF/CNPJ *">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-phone input-icon"></i>
                            <input type="text" id="companyPhone" class="input-field" placeholder="Telefone da Empresa">
                        </div>
                        <div class="input-group">
                            <i class="fas fa-map-marker-alt input-icon"></i>
                            <input type="text" id="companyAddress" class="input-field" placeholder="Endereço">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="flex items-start cursor-pointer">
                            <input type="checkbox" id="acceptTerms" class="w-4 h-4 text-indigo-600 rounded mt-0.5">
                            <span class="ml-2 text-xs text-gray-600">
                                Li e aceito os <a href="#" class="text-indigo-600">Termos de Serviço</a> e 
                                <a href="#" class="text-indigo-600">Política de Privacidade</a>
                            </span>
                        </label>
                    </div>

                    <button type="submit" id="registerSubmitBtn" class="btn-primary">
                        <span>Criar Conta</span>
                    </button>
                </form>

                <div class="text-center mt-6">
                    <button type="button" onclick="showLoginCard()" class="auth-link text-sm">
                        ← Voltar para o login
                    </button>
                </div>
            </div>
        </div>

        <!-- Password Recovery Card -->
        <div id="recoveryCard" class="auth-card" style="display: none;">
            <div class="p-6 md:p-8">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-gradient-to-br from-yellow-500 to-orange-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i class="fas fa-key text-white text-2xl"></i>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Recuperar Senha</h2>
                    <p class="text-gray-500 text-sm mt-1">Digite seu email para receber as instruções</p>
                </div>

                <form id="recoveryForm">
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="recoveryEmail" class="input-field" placeholder="Seu email cadastrado" required>
                    </div>

                    <button type="submit" id="recoverySubmitBtn" class="btn-primary mt-4">
                        <span>Enviar Instruções</span>
                    </button>
                </form>

                <div class="text-center mt-6">
                    <button type="button" onclick="showLoginCard()" class="auth-link text-sm">
                        ← Voltar para o login
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== SUPABASE CONFIG ====================
        const SUPABASE_CONFIG = {
            url: 'https://emkggurctrlcgukvhwdg.supabase.co',
            key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVta2dndXJjdHJsY2d1a3Zod2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDE4OTcsImV4cCI6MjA5NzU3Nzg5N30.F2w7yFAX0Ub_o86T_YHkjO6aL_shGX-H9ESlOJtE6Jo'
        };

        // ==================== ESTADO ====================
        const state = {
            isLoading: false,
            isAuthenticated: false,
            user: null
        };

        // ==================== DOM REFS ====================
        const DOM = {
            loadingOverlay: document.getElementById('loadingOverlay'),
            loadingMessage: document.getElementById('loadingMessage'),
            loadingSubMessage: document.getElementById('loadingSubMessage'),
            loginCard: document.getElementById('loginCard'),
            registerCard: document.getElementById('registerCard'),
            recoveryCard: document.getElementById('recoveryCard'),
            loginForm: document.getElementById('loginForm'),
            registerForm: document.getElementById('registerForm'),
            recoveryForm: document.getElementById('recoveryForm'),
            loginEmail: document.getElementById('loginEmail'),
            loginPassword: document.getElementById('loginPassword'),
            loginSubmitBtn: document.getElementById('loginSubmitBtn'),
            registerSubmitBtn: document.getElementById('registerSubmitBtn'),
            recoverySubmitBtn: document.getElementById('recoverySubmitBtn'),
            rememberMe: document.getElementById('rememberMe'),
            registerRole: document.getElementById('registerRole'),
            companyFields: document.getElementById('companyFields')
        };

        // ==================== TOAST ====================
        function showToast(message, type = 'info') {
            const existingToasts = document.querySelectorAll('.toast');
            existingToasts.forEach(toast => toast.remove());

            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${message}</span>`;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 4000);
        }
        window.showToast = showToast;

        // ==================== LOADING ====================
        function showLoading(message = 'Processando...', subMessage = 'Aguarde um momento') {
            state.isLoading = true;
            DOM.loadingMessage.textContent = message;
            DOM.loadingSubMessage.textContent = subMessage;
            DOM.loadingOverlay.classList.add('active');
            
            if (DOM.loginSubmitBtn) DOM.loginSubmitBtn.disabled = true;
            if (DOM.registerSubmitBtn) DOM.registerSubmitBtn.disabled = true;
            if (DOM.recoverySubmitBtn) DOM.recoverySubmitBtn.disabled = true;
        }

        function hideLoading() {
            state.isLoading = false;
            DOM.loadingOverlay.classList.remove('active');
            
            if (DOM.loginSubmitBtn) DOM.loginSubmitBtn.disabled = false;
            if (DOM.registerSubmitBtn) DOM.registerSubmitBtn.disabled = false;
            if (DOM.recoverySubmitBtn) DOM.recoverySubmitBtn.disabled = false;
        }

        // ==================== SALVAR USUÁRIO LOCAL ====================
        function saveUserLocal(userData) {
            localStorage.setItem('user', JSON.stringify(userData));
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loginTime', new Date().toISOString());
        }

        // ==================== SESSÃO EXISTENTE ====================
        function checkExistingSession() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn === 'true') {
                const loginTime = localStorage.getItem('loginTime');
                const hoursSinceLogin = (new Date() - new Date(loginTime)) / (1000 * 60 * 60);
                if (hoursSinceLogin < 24) {
                    const user = JSON.parse(localStorage.getItem('user') || '{}');
                    if (user.role === 'vendedor') {
                        window.location.href = 'PDV.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                    return;
                }
            }
            loadSavedEmail();
        }

        function loadSavedEmail() {
            const savedEmail = localStorage.getItem('savedEmail');
            if (savedEmail && DOM.loginEmail) {
                DOM.loginEmail.value = savedEmail;
                if (DOM.rememberMe) DOM.rememberMe.checked = true;
            }
        }

        // ==================== NAVEGAÇÃO ENTRE CARDS ====================
        // IMPORTANTE: Declaradas ANTES de serem usadas no HTML
        window.showLoginCard = function() {
            console.log('showLoginCard chamado');
            DOM.loginCard.style.display = 'block';
            DOM.registerCard.style.display = 'none';
            DOM.recoveryCard.style.display = 'none';
        };

        window.showRegisterCard = function() {
            console.log('showRegisterCard chamado');
            DOM.loginCard.style.display = 'none';
            DOM.registerCard.style.display = 'block';
            DOM.recoveryCard.style.display = 'none';
        };

        window.showRecoveryCard = function() {
            console.log('showRecoveryCard chamado');
            DOM.loginCard.style.display = 'none';
            DOM.registerCard.style.display = 'none';
            DOM.recoveryCard.style.display = 'block';
        };

        // ==================== TOGGLE PASSWORD ====================
        window.togglePassword = function(fieldId) {
            const field = document.getElementById(fieldId);
            if (!field) return;
            const icon = field.parentElement.querySelector('.password-toggle i');
            if (!icon) return;
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        };

        // ==================== ROLE SELECTOR ====================
        window.selectRole = function(element) {
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
            const role = element.dataset.role;
            DOM.registerRole.value = role;
            
            if (role === 'admin' || role === 'administrador') {
                DOM.companyFields.classList.add('show');
                document.querySelectorAll('#companyFields .input-field').forEach(el => el.required = true);
            } else {
                DOM.companyFields.classList.remove('show');
                document.querySelectorAll('#companyFields .input-field').forEach(el => el.required = false);
            }
        };

        // ==================== REGISTER ====================
        if (DOM.registerForm) {
            DOM.registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (state.isLoading) {
                    showToast('Aguarde...', 'warning');
                    return;
                }

                // Verificar se o Supabase está disponível
                if (typeof supabase === 'undefined' || !supabase) {
                    showToast('Erro de conexão com o servidor', 'error');
                    return;
                }

                const name = document.getElementById('registerName').value.trim();
                const email = document.getElementById('registerEmail').value.trim();
                const phone = document.getElementById('registerPhone').value.trim();
                const password = document.getElementById('registerPassword').value;
                const confirmPassword = document.getElementById('registerConfirmPassword').value;
                const acceptTerms = document.getElementById('acceptTerms').checked;
                const role = DOM.registerRole.value;

                if (!name || !email || !password) {
                    showToast('Preencha todos os campos obrigatórios', 'warning');
                    return;
                }

                if (password !== confirmPassword) {
                    showToast('As senhas não coincidem', 'error');
                    return;
                }

                if (password.length < 6) {
                    showToast('A senha deve ter pelo menos 6 caracteres', 'warning');
                    return;
                }

                if (!acceptTerms) {
                    showToast('Aceite os termos de serviço', 'warning');
                    return;
                }

                if (role === 'admin' || role === 'administrador') {
                    const companyName = document.getElementById('companyName').value.trim();
                    const companyCnpj = document.getElementById('companyCnpj').value.trim();
                    if (!companyName || !companyCnpj) {
                        showToast('Preencha os dados da empresa (Nome e NIF)', 'warning');
                        return;
                    }
                }

                showLoading('Criando sua conta...', 'Verificando dados...');

                try {
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: { name, role, phone }
                        }
                    });

                    if (error) throw error;

                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert({
                            id: data.user.id,
                            name: name,
                            email: email,
                            phone: phone,
                            role: role,
                            status: 'ativo'
                        });

                    if (profileError) throw profileError;

                    let empresa = null;
                    if (role === 'admin' || role === 'administrador') {
                        const companyName = document.getElementById('companyName').value.trim();
                        const companyCnpj = document.getElementById('companyCnpj').value.trim();
                        const companyPhone = document.getElementById('companyPhone').value.trim();
                        const companyAddress = document.getElementById('companyAddress').value.trim();

                        const { data: empresaData, error: empresaError } = await supabase
                            .from('empresas')
                            .insert({
                                usuario_id: data.user.id,
                                nome: companyName,
                                nif: companyCnpj,
                                telefone: companyPhone || '',
                                endereco: companyAddress || '',
                                data_criacao: new Date().toISOString()
                            })
                            .select()
                            .single();

                        if (empresaError) throw empresaError;
                        empresa = empresaData;
                    }

                    const userData = {
                        id: data.user.id,
                        email: email,
                        name: name,
                        role: role,
                        phone: phone,
                        empresa: empresa
                    };

                    saveUserLocal(userData);
                    state.user = userData;
                    state.isAuthenticated = true;

                    showToast('Conta criada com sucesso!', 'success');
                    
                    setTimeout(() => {
                        hideLoading();
                        if (userData.role === 'vendedor') {
                            window.location.href = 'PDV.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1500);

                } catch (error) {
                    console.error('Erro:', error);
                    let errorMessage = 'Erro ao criar conta';
                    if (error.message) errorMessage = error.message;
                    showToast(errorMessage, 'error');
                    hideLoading();
                }
            });
        }

        // ==================== LOGIN ====================
        if (DOM.loginForm) {
            DOM.loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (state.isLoading) {
                    showToast('Aguarde...', 'warning');
                    return;
                }

                if (typeof supabase === 'undefined' || !supabase) {
                    showToast('Erro de conexão com o servidor', 'error');
                    return;
                }

                const email = DOM.loginEmail.value.trim();
                const password = DOM.loginPassword.value;
                const remember = DOM.rememberMe ? DOM.rememberMe.checked : false;

                if (!email || !password) {
                    showToast('Preencha todos os campos', 'warning');
                    return;
                }

                showLoading('Verificando credenciais...', 'Aguardando resposta do servidor');
                
                try {
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) throw error;

                    if (!data || !data.user) {
                        throw new Error('Falha ao obter dados do utilizador.');
                    }

                    if (remember) {
                        localStorage.setItem('savedEmail', email);
                    } else {
                        localStorage.removeItem('savedEmail');
                    }

                    let userRole = 'user'; 
                    let userName = email.split('@')[0];

                    try {
                        const { data: profile, error: profileErr } = await supabase
                            .from('profiles')
                            .select('*')
                            .eq('id', data.user.id)
                            .maybeSingle();

                        if (profile) {
                            userRole = profile.role || 'user';
                            userName = profile.name || userName;
                        }
                    } catch (pErr) {
                        console.warn('Aviso ao ler tabela profiles, usando dados padrão:', pErr);
                    }

                    const userData = {
                        id: data.user.id,
                        email: data.user.email,
                        name: userName,
                        role: userRole
                    };
                    
                    saveUserLocal(userData);
                    showToast('Login efetuado com sucesso!', 'success');

                    setTimeout(() => {
                        hideLoading();
                        if (userRole === 'vendedor') {
                            window.location.href = 'PDV.html';
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);

                } catch (error) {
                    hideLoading();
                    console.error('Erro detalhado no login:', error);
                    
                    let errorMessage = 'Credenciais inválidas';
                    if (error.message) {
                        if (error.message.includes('Invalid login')) {
                            errorMessage = 'Email ou senha incorretos';
                        } else if (error.message.includes('NetworkError') || error.message.includes('Failed to fetch')) {
                            errorMessage = 'Erro de conexão com o servidor';
                        } else {
                            errorMessage = error.message;
                        }
                    }
                    
                    showToast(errorMessage, 'error');
                    DOM.loginCard.classList.add('shake');
                    setTimeout(() => DOM.loginCard.classList.remove('shake'), 500);
                }
            });
        }

        // ==================== RECOVERY ====================
        if (DOM.recoveryForm) {
            DOM.recoveryForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (state.isLoading) {
                    showToast('Aguarde...', 'warning');
                    return;
                }

                if (typeof supabase === 'undefined' || !supabase) {
                    showToast('Erro de conexão com o servidor', 'error');
                    return;
                }

                const email = document.getElementById('recoveryEmail').value.trim();

                if (!email) {
                    showToast('Digite seu email', 'warning');
                    return;
                }

                showLoading('Enviando email de recuperação...', 'Aguarde um momento');

                try {
                    const { error } = await supabase.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/login.html'
                    });

                    if (error) throw error;

                    showToast('Email de recuperação enviado! Verifique sua caixa de entrada.', 'success');
                    setTimeout(() => {
                        hideLoading();
                        window.showLoginCard();
                    }, 3000);
                    
                } catch (error) {
                    console.error('Erro:', error);
                    let errorMessage = 'Erro ao enviar email';
                    if (error.message) errorMessage = error.message;
                    showToast(errorMessage, 'error');
                    hideLoading();
                }
            });
        }

        // ==================== INICIAR ====================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM carregado!');
            
            // Verificar se as funções estão disponíveis
            console.log('showRegisterCard disponível?', typeof window.showRegisterCard === 'function');
            console.log('showRecoveryCard disponível?', typeof window.showRecoveryCard === 'function');
            console.log('showLoginCard disponível?', typeof window.showLoginCard === 'function');
            
            // Carregar email salvo
            loadSavedEmail();
            
            // Verificar sessão existente
            checkExistingSession();
        });

        console.log('🔐 Sistema de autenticação Supabase carregado!');
    </script>
</body>
</html>
